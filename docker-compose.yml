services:
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: receita_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-receita_federal}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD nao configurado no .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5436}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-receita_federal}"]
      interval: 30s
      timeout: 10s
      retries: 5
    shm_size: 256mb

volumes:
  postgres_data:
    driver: local
